name: mirror_pupil_mobile
description: Mirror Pupil v5.1 — Flutter mobile control center for the trading bot.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  go_router: ^14.6.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  # Firebase dependencies
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1
  # Push notifications
  firebase_messaging: ^14.7.10
  # Logo SVG support
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/icon.png