name: mirror_pupil_mobile
description: Mirror Pupil v5.1 — Flutter mobile control center for the trading bot.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  go_router: ^14.6.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  # Firebase + Google Sign-In (per LOVABLE_MOBILE_APP_SPECIFICATION.md)
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  firebase_messaging: ^15.1.5
  google_sign_in: ^6.2.2
  flutter_svg: ^2.0.10
  flutter_local_notifications: ^17.2.3
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg